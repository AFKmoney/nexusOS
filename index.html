<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus OS // 10.5.2 (Local)</title>
  <link rel="manifest" href="/manifest.json" />
  
  <script>
    window.onerror = function (msg, url, line, col, error) {
      var errMsg = (typeof msg === 'string' ? msg : JSON.stringify(msg) || '').toLowerCase();
      var errStack = (error && error.stack ? error.stack : '').toLowerCase();
      var errUrl = (url || '').toLowerCase();

      var isExtension = errUrl.includes('chrome-extension://') || 
                        errUrl.includes('moz-extension://') || 
                        errStack.includes('chrome-extension://') ||
                        errStack.includes('evmask');

      var isWeb3 = errMsg.includes('ethereum') || 
                   errMsg.includes('phantom') || 
                   errMsg.includes('webrtc') ||
                   errStack.includes('ethereum') ||
                   errStack.includes('phantom');

      if (isExtension || isWeb3) {
        console.warn('[SYSTEM] Ignored external injection error:', msg);
        return true;
      }

      var container = document.createElement('div');
      container.style.cssText = 'background:#000;color:#ff3333;padding:50px;font-family:monospace;height:100vh;overflow:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;';

      var inner = document.createElement('div');
      inner.style.cssText = 'border:1px solid #333;padding:40px;background:#080808;border-radius:20px;max-width:800px;width:90%';
      container.appendChild(inner);

      var h1 = document.createElement('h1');
      h1.style.cssText = 'border-bottom:1px solid #333;padding-bottom:10px;margin-bottom:20px;font-size:24px';
      h1.textContent = 'SYSTEM_INITIALIZATION_FAILURE';
      inner.appendChild(h1);

      var p1 = document.createElement('p');
      p1.style.marginBottom = '10px';
      var b1 = document.createElement('b');
      b1.textContent = 'CRITICAL ERROR: ';
      p1.appendChild(b1);
      p1.appendChild(document.createTextNode(msg));
      inner.appendChild(p1);

      var p2 = document.createElement('p');
      p2.style.cssText = 'margin-bottom:20px;color:#666;font-size:12px';
      var b2 = document.createElement('b');
      b2.textContent = 'LOCATION: ';
      p2.appendChild(b2);
      p2.appendChild(document.createTextNode(url + ':' + line + ':' + col));
      inner.appendChild(p2);

      var pre = document.createElement('pre');
      pre.style.cssText = 'background:#000;padding:20px;border-radius:10px;border:1px solid #222;text-align:left;font-size:12px;white-space:pre-wrap;word-break:break-all';
      pre.textContent = error ? (error.stack || error) : 'No stack trace available';
      inner.appendChild(pre);

      var btn = document.createElement('button');
      btn.style.cssText = 'background:#111;color:#10b981;border:1px solid #10b981;padding:12px 30px;cursor:pointer;margin-top:30px;border-radius:8px;font-weight:bold;text-transform:uppercase;letter-spacing:1px';
      btn.textContent = 'RETRY_BOOT_SEQUENCE';
      btn.onclick = function() { location.reload(); };
      inner.appendChild(btn);

      document.body.innerHTML = '';
      document.body.appendChild(container);
      return false;
    };
  </script>

  <!-- Removed external Tailwind CDN to support Air-Gapped Security Headers -->
  <!-- <script src="https://cdn.tailwindcss.com"></script> -->
  <style>
    body {
      background-color: #050505;
      color: #e0e0e0;
      font-family: sans-serif;
      margin: 0;
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
