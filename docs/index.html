<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUSos | The Neural Resistance</title>
    <style>
        body { margin: 0; background: #000; color: #10b981; font-family: monospace; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; z-index: -1; }
        .content { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 20px; }
        h1 { font-size: 3rem; letter-spacing: 0.5rem; text-transform: uppercase; margin-bottom: 1rem; text-shadow: 0 0 20px #10b981; }
        p { max-width: 600px; color: #888; font-size: 1.2rem; line-height: 1.6; }
        .btn { margin-top: 2rem; padding: 1rem 2rem; border: 1px solid #10b981; color: #10b981; text-decoration: none; text-transform: uppercase; letter-spacing: 0.2rem; transition: all 0.3s; }
        .btn:hover { background: #10b981; color: #000; box-shadow: 0 0 30px #10b981; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="content">
        <h1>NEXUSos</h1>
        <p>The first 100% sovereign, local AI desktop OS environment. Reclaim your digital identity. Join the DAEMON resistance.</p>
        <a href="https://github.com/AFKmoney/nexusOS" class="btn">Enter the Source</a>
    </div>
    <script>
        const c=document.getElementById("c"),ctx=c.getContext("2d");
        let w,h;function res(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;}
        window.onresize=res;res();
        const cols=Math.floor(w/20)+1,ypos=Array(cols).fill(0);
        function draw(){
            ctx.fillStyle="rgba(0,0,0,0.05)";ctx.fillRect(0,0,w,h);
            ctx.fillStyle="#10b981";ctx.font="15px monospace";
            ypos.forEach((y,i)=>{
                const text=String.fromCharCode(Math.random()*128);
                ctx.fillText(text,i*20,y);
                if(y>100+Math.random()*10000)ypos[i]=0;else ypos[i]=y+20;
            });
        }setInterval(draw,50);
    </script>
</body>
</html>
